<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#FAF7F2" />
    <!-- title et description injectés par route via src/prerender.jsx pour éviter les doublons -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zenbat" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Préchargement des Google Fonts utilisées dans les devis / factures.
         Sans ce préchargement, html2canvas peut capturer AVANT que les polices
         soient téléchargées → le PDF utilise la police système fallback au lieu
         de DM Sans / Playfair / Space Grotesk → rendu "bizarre" inconsistant
         avec l'aperçu HTML. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@400;600;700&display=swap">

    <!-- Trustpilot TrustBox widget bootstrap (chargé une seule fois, async) -->
    <script type="text/javascript" src="//widget.trustpilot.com/bootstrap/v5/tp.widget.bootstrap.min.js" async></script>

    <!-- Trustpilot AFS — invitations automatiques d'avis.
         Initialise la queue tp() ; les invitations sont déclenchées via
         tp('createInvitation', { recipientEmail, recipientName, referenceId, source })
         après une transaction réussie (paiement Stripe, devis signé, etc.). -->
    <script>
      (function(w,d,s,r,n){w.TrustpilotObject=n;w[n]=w[n]||function(){(w[n].q=w[n].q||[]).push(arguments)};
        a=d.createElement(s);a.async=1;a.src=r;a.type='text/java'+s;f=d.getElementsByTagName(s)[0];
        f.parentNode.insertBefore(a,f)})(window,document,'script','https://invitejs.trustpilot.com/tp.min.js','tp');
      tp('register','wXmwGF7UnNEwrVCk');
    </script>

    <title>Zenbat — L'assistant commercial vocal des TPE</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error" style="display:none;position:fixed;inset:0;padding:24px;background:#fef2f2;color:#991b1b;font-family:system-ui,sans-serif;font-size:13px;overflow:auto;z-index:99999;">
      <h2 style="margin:0 0 12px;font-size:16px;">Zenbat — erreur de démarrage</h2>
      <pre id="boot-error-msg" style="white-space:pre-wrap;word-break:break-word;margin:0;"></pre>
    </div>
    <!-- [APP_LOGGER] Telemetry bootstrap — runs before React -->
    <script>
      // [APP_LOGGER] Module de télémétrie centralisé — initialisé avant React
      (function () {
        var SESSION_ID;
        // [APP_LOGGER] ID unique par session
        try { SESSION_ID = crypto.randomUUID(); } catch (e) { SESSION_ID = Date.now() + '-' + Math.random().toString(36).slice(2); }

        var SUPABASE_URL = '%VITE_SUPABASE_URL%';
        var SUPABASE_ANON_KEY = '%VITE_SUPABASE_ANON_KEY%';
        var PENDING_KEY = 'pending_logs';

        // [APP_LOGGER] Envoi REST vers Supabase (sans SDK)
        function sendToSupabase(payload) {
          try {
            if (!SUPABASE_URL || SUPABASE_URL.indexOf('%') === 0) return Promise.reject('no-config');
            return fetch(SUPABASE_URL + '/rest/v1/app_logs', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
                'Prefer': 'return=minimal',
              },
              body: JSON.stringify(payload),
            }).then(function (r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
            });
          } catch (e) { return Promise.reject(e); }
        }

        // [APP_LOGGER] Fallback localStorage si Supabase échoue
        function storePending(payload) {
          try {
            var list = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
            list.push(payload);
            if (list.length > 50) list = list.slice(-50);
            localStorage.setItem(PENDING_KEY, JSON.stringify(list));
          } catch (e) { /* storage unavailable */ }
        }

        // [APP_LOGGER] Renvoi des logs en attente (appelé au démarrage)
        function flushPending() {
          try {
            var list = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
            if (!list.length) return;
            localStorage.removeItem(PENDING_KEY);
            list.forEach(function (p) {
              sendToSupabase(p).catch(function () { storePending(p); });
            });
          } catch (e) { /* ignore */ }
        }

        // [APP_LOGGER] Throttle/dedup en mémoire — empêche un useEffect en
        // boucle qui throw de noyer la table (et faire exploser le quota
        // Supabase). Limite : 5 logs par message identique par minute, et
        // 60 logs / session toutes catégories confondues (filet absolu).
        var DEDUP_WINDOW_MS = 60_000;
        var DEDUP_MAX_PER_MSG = 5;
        var SESSION_MAX = 60;
        var dedup = Object.create(null);
        var sessionCount = 0;
        function shouldDrop(message) {
          if (sessionCount >= SESSION_MAX) return true;
          var key = String(message).slice(0, 200);
          var now = Date.now();
          var bucket = dedup[key] || { count: 0, since: now };
          if (now - bucket.since > DEDUP_WINDOW_MS) { bucket.count = 0; bucket.since = now; }
          bucket.count += 1;
          dedup[key] = bucket;
          return bucket.count > DEDUP_MAX_PER_MSG;
        }

        // [APP_LOGGER] Masque les tokens de devis publics dans l'URL avant
        // de la pousser en log (PII / risque de leak côté admin export CSV).
        function sanitizeUrl(href) {
          try { return String(href).replace(/(\/devis\/[^/?#]+)/g, '/devis/***'); }
          catch (e) { return String(href || ''); }
        }

        // [APP_LOGGER] Envoi effectif avec fallback
        function send(level, message, stack, context) {
          try {
            if (level !== 'info' && shouldDrop(message)) return;
            sessionCount += 1;
            var payload = {
              level: level,
              message: String(message).slice(0, 2000),
              stack: stack ? String(stack).slice(0, 5000) : null,
              context: Object.assign(
                { session_id: SESSION_ID, url: sanitizeUrl(location.href), ua: navigator.userAgent.slice(0, 200) },
                context || {}
              ),
            };
            sendToSupabase(payload).catch(function () { storePending(payload); });
          } catch (e) { /* jamais de blocage UI */ }
        }

        // [APP_LOGGER] API publique exposée sur window
        window.AppLogger = {
          logError: function (message, stack, context) { try { send('error', message, stack, context); } catch (e) {} },
          logInfo:  function (message, context)         { try { send('info',  message, null,  context); } catch (e) {} },
          flushPending: flushPending,
          sessionId: SESSION_ID,
        };

        // [APP_LOGGER] Filtre les erreurs hors-scope (extensions navigateur,
        // scripts tiers). « Script error. » sans détail = CORS sur un script
        // externe, l'erreur ne vient pas de notre code. « inline is not
        // defined », « __EXT_*_ » : injections d'extensions Chrome/Safari
        // (uBlock, Honey, traducteurs, etc.). Filename hors notre origine =
        // pareil. Filtrer ce bruit empêche de polluer le panel admin avec
        // des erreurs sur lesquelles on ne peut rien faire.
        function isExternalNoise(message, filename) {
          var msg = String(message || '');
          if (msg === 'Script error.' || msg === 'Script error') return true;
          if (/^(inline|chrome|webkit|safari)\s+is not defined$/i.test(msg)) return true;
          if (/extension:\/\/|moz-extension:\/\/|chrome-extension:\/\//i.test(msg)) return true;
          // « Object Not Found Matching Id:N, MethodName:update, ParamCount:N » :
          // injection d'une extension navigateur / outil d'automatisation (RPA).
          // Jamais émis par notre code — observé en masse en prod sans stack.
          if (/Object Not Found Matching Id:\s*\d+/i.test(msg)) return true;
          // Web Locks API de Supabase auth : quand un onglet/refresh prend le
          // verrou de refresh token avec { steal: true }, l'opération en cours
          // est avortée. Contention bénigne et par design (l'opération perdante
          // est rejouée) — inutile de polluer le panel admin.
          if (/Lock (was stolen by another request|broken by another request with the 'steal' option)/i.test(msg)) return true;
          if (filename) {
            var f = String(filename);
            if (/^(chrome|moz|safari|edge)-extension:/i.test(f)) return true;
            // Filename vide ou différent de notre origine (souvent injection)
            try {
              if (f && f.indexOf(location.origin) !== 0 && !f.startsWith('/') && !f.startsWith('blob:')) return true;
            } catch (e) {}
          }
          return false;
        }

        // [APP_LOGGER] Capture automatique des erreurs JS non gérées
        window.addEventListener('error', function (e) {
          try {
            if (isExternalNoise(e.message, e.filename)) return;
            window.AppLogger.logError(
              e.message || 'JS Error',
              e.error && e.error.stack ? e.error.stack : (e.filename + ':' + e.lineno),
              { type: 'window.onerror', filename: e.filename, lineno: e.lineno }
            );
          } catch (ex) {}
        });

        // [APP_LOGGER] Capture automatique des promesses rejetées non gérées
        window.addEventListener('unhandledrejection', function (e) {
          try {
            var reason = e.reason || {};
            var msg = reason.message || String(e.reason) || 'Unhandled rejection';
            if (isExternalNoise(msg, reason.fileName || reason.filename)) return;
            window.AppLogger.logError(
              msg,
              reason.stack || null,
              { type: 'unhandledrejection' }
            );
          } catch (ex) {}
        });

        // [APP_LOGGER] Renvoi immédiat des logs en attente du démarrage précédent
        try { flushPending(); } catch (e) {}
      })();
    </script>

    <script>
      (function () {
        function format(err, fallback) {
          if (!err) return fallback || 'Unknown error';
          var name = err.name || '';
          var msg = err.message || '';
          var stack = err.stack || '';
          var parts = [];
          if (name || msg) parts.push((name ? name + ': ' : '') + msg);
          if (stack) parts.push(stack);
          return parts.join('\n\n') || String(err);
        }
        function show(text) {
          var box = document.getElementById('boot-error');
          var pre = document.getElementById('boot-error-msg');
          if (box && pre) { pre.textContent = String(text); box.style.display = 'block'; }
        }
        window.addEventListener('error', function (e) {
          show(format(e.error, e.message));
        });
        window.addEventListener('unhandledrejection', function (e) {
          show(format(e.reason, 'Unhandled promise rejection'));
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && !root.children.length) {
            show('Le JavaScript ne s\'est jamais exécuté (timeout 8s). Vérifiez le build Vercel ou le cache.');
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

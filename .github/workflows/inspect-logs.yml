name: Auto-inspection des logs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install @supabase/supabase-js @anthropic-ai/sdk

      - run: node .github/scripts/inspect-agent.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-haiku-4-5-20251001

      - name: Commit rapport et corrections
        run: |
          git config user.name "inspect-agent[bot]"
          git config user.email "bot@chantigest-pro"
          git add -A
          git diff --staged --quiet || git commit -m "🤖 Auto-fix $(date +'%Y-%m-%d %H:%M')" && git push || true

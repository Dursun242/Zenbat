<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Zenbat — SaaS de devis BTP boosté à l'IA. Créez vos devis en quelques secondes." />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zenbat" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Zenbat — Devis BTP</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error" style="display:none;position:fixed;inset:0;padding:24px;background:#fef2f2;color:#991b1b;font-family:system-ui,sans-serif;font-size:13px;overflow:auto;z-index:99999;">
      <h2 style="margin:0 0 12px;font-size:16px;">Zenbat — erreur de démarrage</h2>
      <pre id="boot-error-msg" style="white-space:pre-wrap;word-break:break-word;margin:0;"></pre>
    </div>
    <script>
      (function () {
        function show(msg) {
          var box = document.getElementById('boot-error');
          var pre = document.getElementById('boot-error-msg');
          if (box && pre) { pre.textContent = String(msg); box.style.display = 'block'; }
        }
        window.addEventListener('error', function (e) {
          show((e.error && (e.error.stack || e.error.message)) || e.message || 'Unknown error');
        });
        window.addEventListener('unhandledrejection', function (e) {
          show((e.reason && (e.reason.stack || e.reason.message)) || e.reason || 'Unhandled promise rejection');
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          if (root && !root.children.length) {
            show('Le JavaScript ne s\'est jamais exécuté (timeout 8s). Vérifiez le build Vercel ou le cache.');
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
